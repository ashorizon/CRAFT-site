<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的项目介绍</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f6f8fa;
      color: #24292f;
      line-height: 1.7;
    }

    .container {
      max-width: 820px;
      margin: 60px auto;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
    }

    h1 {
      margin-top: 0;
    }

    a {
      color: #0969da;
    }

    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 18px;
      background: #24292f;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .button:hover {
      background: #444c56;
    }

<body>
  <main class="container">
    <h1>我的项目名称</h1>

    <p>
      这是一个关于“我的项目”的介绍网站。这里可以写项目是做什么的、解决什么问题、适合谁使用。
    </p>

    <h2>项目功能</h2>
    <ul>
      <li>功能一：这里写第一个功能</li>
      <li>功能二：这里写第二个功能</li>
      <li>功能三：这里写第三个功能</li>
    </ul>

    <h2>项目亮点</h2>
    <p>
      这里可以写你的项目相比其他方案有什么优点，例如更简单、更快、更容易部署等。
    </p>

    <h2>如何使用</h2>
    <p>
      这里可以简单写安装方式、运行方式，或者放一张项目截图。
    </p>

    <a class="button" href="https://github.com/ashorizon/CRAFT">
      查看项目仓库

</html>
